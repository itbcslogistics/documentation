<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login/Registrasi Karyawan</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d121b] dark:text-white">
<div class="relative flex min-h-screen w-full flex-col justify-between overflow-x-hidden max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-xl">
<!-- Header Section with Image & Text -->
<div class="flex flex-col w-full">
<div class="w-full h-64 relative overflow-hidden rounded-b-3xl">
<div class="absolute inset-0 bg-gradient-to-t from-background-light dark:from-background-dark to-transparent z-10"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-cover" data-alt="Modern office building glass facade with blue sky reflection" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuC0cujNJ0UPEtwfcDfP0Cvjn-xAsRwR1Y6EBLxahgLEicuQhaCQLPA_J_orcekJs2Q26TTSKsZJ94qXiQxf_GUdeNErJCIdFvSepLYXLM2ird_1SCo95G0G7yEP4a0NKBfwvjAGR8YOanlX9iKvbah3JT1TWfqxcnFdmexKPa-fX64qr8yyxti_3iSBLqDHxNclymlwC1XP_lfOpSedio34k7cWm-RYoyewfM-5Z6UujqdIehERAIeNqqsZRbC_2v9go8b2913Wat8");'>
</div>
</div>
<div class="px-6 -mt-12 relative z-20">
<div class="bg-white dark:bg-[#1e2532] rounded-2xl shadow-sm p-6 border border-gray-100 dark:border-gray-800">
<h1 class="text-[#0d121b] dark:text-white tracking-tight text-2xl font-bold leading-tight text-center mb-2">Halo, Karyawan</h1>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal text-center">Silakan masukkan ID dan kata sandi untuk presensi harian Anda.</p>
</div>
</div>
</div>
<!-- Main Form Content -->
<div class="flex-1 flex flex-col px-6 pt-6 pb-4">
<!-- Segmented Control -->
<div class="flex mb-6">
<div class="flex h-12 flex-1 items-center justify-center rounded-xl bg-gray-200 dark:bg-[#1e2532] p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-[#2c3442] has-[:checked]:shadow-sm transition-all duration-200">
<span class="truncate text-sm font-medium leading-normal text-gray-600 dark:text-gray-300 has-[:checked]:text-primary">Masuk</span>
<input checked="" class="invisible w-0" name="auth-type" type="radio" value="Masuk"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-[#2c3442] has-[:checked]:shadow-sm transition-all duration-200">
<span class="truncate text-sm font-medium leading-normal text-gray-600 dark:text-gray-300 has-[:checked]:text-primary">Daftar</span>
<input class="invisible w-0" name="auth-type" type="radio" value="Daftar"/>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="flex flex-col gap-5">
<!-- ID Input -->
<label class="flex flex-col flex-1">
<p class="text-[#0d121b] dark:text-white text-sm font-semibold leading-normal pb-2">Email atau ID Karyawan</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#1e2532] focus:border-primary h-12 placeholder:text-gray-400 pl-11 pr-4 text-sm font-normal leading-normal transition-colors" placeholder="co: 12345 atau nama@perusahaan.com" value=""/>
</div>
</label>
<!-- Password Input -->
<label class="flex flex-col flex-1">
<p class="text-[#0d121b] dark:text-white text-sm font-semibold leading-normal pb-2">Kata Sandi</p>
<div class="relative">
<div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-gray-200 dark:border-gray-700 bg-white dark:bg-[#1e2532] focus:border-primary h-12 placeholder:text-gray-400 pl-11 pr-11 text-sm font-normal leading-normal transition-colors" placeholder="Masukkan kata sandi" type="password" value=""/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</label>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-xs font-medium text-primary hover:text-primary/80 transition-colors" href="#">Lupa Kata Sandi?</a>
</div>
</div>
<!-- Spacer -->
<div class="grow"></div>
<!-- Bottom Actions -->
<div class="mt-8 flex flex-col gap-4">
<button class="flex w-full items-center justify-center rounded-xl bg-primary px-4 h-12 text-white text-base font-bold shadow-lg shadow-primary/30 hover:bg-primary/90 active:scale-[0.98] transition-all">
                    Masuk
                </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
<span class="flex-shrink-0 mx-4 text-gray-400 text-xs">Atau masuk dengan</span>
<div class="flex-grow border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="flex gap-3 justify-center">
<button class="flex h-12 w-12 items-center justify-center rounded-full bg-white dark:bg-[#1e2532] border border-gray-200 dark:border-gray-700 shadow-sm hover:bg-gray-50 dark:hover:bg-[#2c3442] transition-colors">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-300">fingerprint</span>
</button>
<button class="flex h-12 w-12 items-center justify-center rounded-full bg-white dark:bg-[#1e2532] border border-gray-200 dark:border-gray-700 shadow-sm hover:bg-gray-50 dark:hover:bg-[#2c3442] transition-colors">
<span class="material-symbols-outlined text-gray-600 dark:text-gray-300">face</span>
</button>
</div>
<div class="text-center mt-2">
<p class="text-sm text-gray-500 dark:text-gray-400">Belum punya akun? <a class="font-semibold text-primary" href="#">Daftar Sekarang</a></p>
</div>
</div>
</div>
<!-- Bottom Safe Area Spacer -->
<div class="h-5 w-full bg-transparent"></div>
</div>
</body></html>
