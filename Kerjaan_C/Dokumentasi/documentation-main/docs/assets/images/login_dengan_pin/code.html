<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Input PIN Keamanan</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #cfd7e7;
            transition: all 0.2s ease;
        }
        .pin-dot.filled {
            background-color: #135bec;
            border-color: #135bec;
        }
        .keypad-btn {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 500;
            border-radius: 9999px;
            background-color: #ffffff;
            color: #0d121b;
            transition: background-color 0.1s;
        }
        .keypad-btn:active {
            background-color: #e2e8f0;
        }
        .dark .keypad-btn {
            background-color: #1e293b;
            color: #f8fafc;
        }
        .dark .keypad-btn:active {
            background-color: #334155;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-[#0d121b] dark:text-white flex size-12 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</button>
<div class="flex-grow"></div>
<div class="size-12"></div> <!-- Spacer for symmetry -->
</div>
<!-- Content Area -->
<div class="flex flex-col items-center flex-grow px-6 pt-8">
<!-- Logo or Icon placeholder -->
<div class="mb-6 flex justify-center">
<div class="bg-primary/10 p-4 rounded-full">
<span class="material-symbols-outlined text-primary text-4xl">lock</span>
</div>
</div>
<!-- Headline -->
<h2 class="text-[#0d121b] dark:text-white tracking-tight text-[28px] font-bold leading-tight text-center pb-2">
            Masukkan PIN Anda
        </h2>
<!-- Instruction -->
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-normal text-center max-w-xs">
            Silakan masukkan 6 digit PIN keamanan Anda untuk memverifikasi identitas.
        </p>
<!-- PIN Indicator Section -->
<div class="flex justify-center gap-4 py-12">
<div class="pin-dot filled"></div>
<div class="pin-dot filled"></div>
<div class="pin-dot filled"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
<div class="pin-dot"></div>
</div>
<!-- Helper Link -->
<button class="text-primary font-semibold text-sm mb-8 hover:underline">
            Lupa PIN?
        </button>
<!-- Keypad Container -->
<div class="w-full max-w-[280px] mb-auto">
<div class="grid grid-cols-3 gap-y-4 gap-x-8 justify-items-center">
<!-- Row 1 -->
<button class="keypad-btn">1</button>
<button class="keypad-btn">2</button>
<button class="keypad-btn">3</button>
<!-- Row 2 -->
<button class="keypad-btn">4</button>
<button class="keypad-btn">5</button>
<button class="keypad-btn">6</button>
<!-- Row 3 -->
<button class="keypad-btn">7</button>
<button class="keypad-btn">8</button>
<button class="keypad-btn">9</button>
<!-- Row 4 -->
<button class="keypad-btn bg-transparent dark:bg-transparent shadow-none">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
</button>
<button class="keypad-btn">0</button>
<button class="keypad-btn bg-transparent dark:bg-transparent shadow-none">
<span class="material-symbols-outlined text-2xl">backspace</span>
</button>
</div>
</div>
</div>
<!-- iOS Home Indicator Space -->
<div class="h-8 bg-background-light dark:bg-background-dark"></div>
<!-- Note for UI: The iOS Keyboard component is replaced with this custom PIN-specific numeric pad as per the request -->
</body></html>
