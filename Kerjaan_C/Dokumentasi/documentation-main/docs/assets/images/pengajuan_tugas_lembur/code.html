</div>

</button>

<div class="text-slate-400 dark:text-slate-500 text-[12px] font-semibold text-center pb-2">S</div>

<div class="col-span-3"></div>

<button class="h-9 w-full flex items-center justify-center relative">
<div class="absolute inset-0 m-auto size-9 rounded-full bg-primary shadow-lg shadow-primary/30"></div>

</button>
<button class="h-9 w-full flex items-center justify-center text-sm font-medium text-slate-700 dark:text-slate-300 rounded-full hover:bg-gray-100 dark:hover:bg-white/5">6</button>

<span class="text-primary font-bold text-lg bg-primary/10 px-3 py-1 rounded-lg">3 Jam</span>
</div>
<div class="relative flex items-center h-8 w-full group">

<div class="absolute h-1.5 w-[32%] rounded-full bg-primary"></div>

<div class="size-1.5 rounded-full bg-primary"></div>
</div>
</div>
<div class="flex justify-between mt-2 text-xs font-medium text-slate-400 dark:text-slate-500">
<span>1 Jam</span>
<span>8 Jam</span>
</div>
</div>
</div>

<div class="absolute bottom-3 right-3 text-xs text-slate-400 font-medium bg-surface-light dark:bg-surface-dark px-2 py-1 rounded-md">0/200</div>
</div>
</div>

<div class="px-4 pt-8 pb-4">

</div>
<div class="space-y-3">
<!-- History Item: Pending -->
<div class="bg-surface-light dark:bg-surface-dark p-4 rounded-xl border border-border-light dark:border-border-dark shadow-sm flex items-center justify-between">
<div class="flex items-start gap-3">
<div class="size-10 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center shrink-0 text-orange-600 dark:text-orange-400">
<span class="material-symbols-outlined text-[20px]">schedule</span>
</div>
<div>
<p class="text-slate-900 dark:text-white font-semibold text-sm">Fixing Bug Login</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5">12 Okt 2023 • 2 Jam</p>
</div>
</div>
<span class="inline-flex items-center rounded-full bg-orange-50 dark:bg-orange-900/20 px-2.5 py-0.5 text-xs font-medium text-orange-700 dark:text-orange-300 ring-1 ring-inset ring-orange-600/10 dark:ring-orange-500/20">

                        </span>
</div>

<div class="flex items-start gap-3">
<div class="size-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center shrink-0 text-green-600 dark:text-green-400">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
</div>
<div>
<p class="text-slate-900 dark:text-white font-semibold text-sm">Meeting Client A</p>
<p class="text-slate-500 dark:text-slate-400 text-xs mt-0.5">05 Okt 2023 • 4 Jam</p>
</div>
</div>
<span class="inline-flex items-center rounded-full bg-green-50 dark:bg-green-900/20 px-2.5 py-0.5 text-xs font-medium text-green-700 dark:text-green-300 ring-1 ring-inset ring-green-600/20 dark:ring-green-500/20">
                            Disetujui
                        </span>
</div>
<!-- History Item: Rejected -->

<div class="flex items-start gap-3">
<div class="size-10 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center shrink-0 text-red-600 dark:text-red-400">

</div>
<div>

</div>
</div>
<span class="inline-flex items-center rounded-full bg-red-50 dark:bg-red-900/20 px-2.5 py-0.5 text-xs font-medium text-red-700 dark:text-red-300 ring-1 ring-inset ring-red-600/10 dark:ring-red-500/20">

                        </span>
</div>
</div>
</div>

<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-size: 20px;">send</span>
